name: patchscope

services:
  api:
    build:
      context: .
    command: ["patchscope", "serve", "--host", "0.0.0.0", "--port", "8787"]
    environment:
      PATCHSCOPE_DATA_DIR: /data
      PATCHSCOPE_ALLOWED_ORIGINS: '["http://127.0.0.1:8501","http://localhost:8501"]'
      PATCHSCOPE_AI_MODE: ${PATCHSCOPE_AI_MODE:-offline}
      PATCHSCOPE_OPENAI_MODEL: ${PATCHSCOPE_OPENAI_MODEL:-gpt-5-mini}
      PATCHSCOPE_OPENAI_API_KEY: ${PATCHSCOPE_OPENAI_API_KEY:-}
      PATCHSCOPE_OPENAI_MAX_PROMPT_CHARS: ${PATCHSCOPE_OPENAI_MAX_PROMPT_CHARS:-120000}
      PATCHSCOPE_OPENAI_MAX_COMPLETION_TOKENS: ${PATCHSCOPE_OPENAI_MAX_COMPLETION_TOKENS:-4096}
      PATCHSCOPE_GITHUB_TOKEN: ${PATCHSCOPE_GITHUB_TOKEN:-}
      PATCHSCOPE_MAX_FILE_BYTES: ${PATCHSCOPE_MAX_FILE_BYTES:-500000}
      PATCHSCOPE_MAX_REVIEW_BYTES: ${PATCHSCOPE_MAX_REVIEW_BYTES:-2000000}
      PATCHSCOPE_MAX_FILES: ${PATCHSCOPE_MAX_FILES:-100}
      PATCHSCOPE_ANALYZER_TIMEOUT_SECONDS: ${PATCHSCOPE_ANALYZER_TIMEOUT_SECONDS:-20}
      PATCHSCOPE_GITHUB_TIMEOUT_SECONDS: ${PATCHSCOPE_GITHUB_TIMEOUT_SECONDS:-10}
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - patchscope-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/ready', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  workbench:
    build:
      context: .
    command: ["patchscope", "ui", "--host", "0.0.0.0", "--port", "8501"]
    environment:
      PATCHSCOPE_API_URL: http://api:8787
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  patchscope-data:
