    <path d="M1339 514l5 5 5-5" fill="none" stroke="#607077" stroke-width="1.5" stroke-linecap="round"/>

    <text x="72" y="565" class="small muted">8 of 8 findings</text>
    <text x="72" y="592" class="label ink">Finding</text>

    <rect x="72" y="607" width="502" height="66" rx="9" fill="#FFFFFF" stroke="#1F6F78" stroke-width="2"/>
    <circle cx="94" cy="630" r="7" fill="#1F6F78"/>
    <circle cx="94" cy="630" r="2.5" fill="#FFFFFF"/>
