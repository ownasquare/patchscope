<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">PatchScope completed code review</title>
  <desc id="desc">A faithful illustration of the PatchScope result screen with a decision, four summary metrics, compact filters, prioritized findings, source evidence, and a preview-only refactor.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#172126" flood-opacity="0.12"/>
    </filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .ink { fill: #172126; }
      .muted { fill: #607077; }
      .quiet { fill: #809097; }
      .small { font-size: 13px; }
      .label { font-size: 14px; font-weight: 650; }
      .body { font-size: 15px; }
      .heading { font-size: 22px; font-weight: 720; }
      .title { font-size: 29px; font-weight: 760; letter-spacing: -0.02em; }
      .metric { font-size: 30px; font-weight: 760; }
    </style>
  </defs>

  <rect width="1440" height="820" rx="24" fill="#E9EEF0"/>
  <circle cx="1340" cy="52" r="190" fill="#D7E7E8" opacity="0.85"/>
  <circle cx="84" cy="786" r="190" fill="#DDE7E8" opacity="0.7"/>
