      <rect x="72" y="333" width="305" height="92" rx="10" fill="#FFFFFF" stroke="#CDD5D9"/>
      <text x="92" y="359" class="small muted">FINDINGS</text>
      <text x="92" y="401" class="metric ink">8</text>

      <rect x="391" y="333" width="305" height="92" rx="10" fill="#FFFFFF" stroke="#CDD5D9"/>
