    <text x="111" y="651" class="small muted">insecure_checkout.py:10</text>
    <rect x="72" y="685" width="502" height="58" rx="9" fill="#FFFFFF" stroke="#CDD5D9"/>
    <circle cx="94" cy="714" r="7" fill="#FFFFFF" stroke="#9EACB2"/>
