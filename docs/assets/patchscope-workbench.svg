    <path d="M81 75h15l-4.5 7 4.5 7H81l4.5-7z" fill="#FFFFFF"/>
    <text x="122" y="88" class="heading ink">PatchScope</text>
    <text x="122" y="112" class="small muted">Review code, inspect the evidence, and decide what changes to keep.</text>

