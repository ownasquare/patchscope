    <text x="111" y="731" class="small muted">insecure_checkout.py:12</text>

    <rect x="598" y="579" width="766" height="164" rx="11" fill="#FFFFFF" stroke="#CDD5D9"/>
    <text x="622" y="611" class="heading ink">A mutable default argument is shared between calls</text>
    <rect x="622" y="628" width="44" height="22" rx="11" fill="#FCE8E6"/>
    <text x="633" y="644" class="small" fill="#8D312B">High</text>
    <rect x="674" y="628" width="42" height="22" rx="11" fill="#E7EFF8"/>
    <text x="686" y="644" class="small" fill="#345A7B">Bug</text>
    <rect x="724" y="628" width="43" height="22" rx="11" fill="#EDF1F2"/>
    <text x="735" y="644" class="small muted">Open</text>
    <text x="622" y="675" class="small muted">insecure_checkout.py:10 · exact source evidence</text>
    <text x="622" y="702" class="label ink">Recommended change</text>
    <text x="622" y="725" class="body muted">Use None as the default and create the collection inside the function.</text>
    <rect x="1208" y="693" width="132" height="31" rx="6" fill="#E3EFF0"/>
    <text x="1225" y="713" class="small" fill="#185C64">Preview only</text>
