    <line x1="72" y1="478" x2="130" y2="478" stroke="#1F6F78" stroke-width="3"/>

    <rect x="72" y="496" width="1110" height="42" rx="7" fill="#FFFFFF" stroke="#BFCACE"/>
    <text x="90" y="522" class="small quiet">Issue, file, rule, or analyzer</text>
    <rect x="1196" y="496" width="168" height="42" rx="7" fill="#FFFFFF" stroke="#BFCACE"/>
    <path d="M1216 509h14l-5 6v7l-4 2v-9z" fill="none" stroke="#607077" stroke-width="1.5" stroke-linejoin="round"/>
